name: vibe_tale
description: "VibeTale - AI-powered immersive e-book reading application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # Audio
  just_audio: ^0.9.46
  audio_session: ^0.1.21

  # File handling
  file_picker: ^8.3.7

  # Network & Images
  cached_network_image: ^3.4.1

  # Charts
  fl_chart: ^0.69.2

  # Utilities
  shared_preferences: ^2.5.3
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
